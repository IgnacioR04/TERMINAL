name: Historical macro

on:
  schedule:
    - cron: "0 22 * * *"     # cada dia a las 22:00 UTC (cierre EEUU)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: python fetch_historical.py
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/historical_data.json
          git diff --staged --quiet || git commit -m "historical macro $(date -u +%Y-%m-%d)"
          git push
