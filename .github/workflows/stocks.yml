name: Stocks daily

on:
  schedule:
    - cron: "30 22 * * *"    # cada dia a las 22:30 UTC, 30 min despues del historico
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: python fetch_stocks.py
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/stocks_list.json data/stocks_detail/
          git diff --staged --quiet || git commit -m "stocks daily $(date -u +%Y-%m-%d)"
          git push
