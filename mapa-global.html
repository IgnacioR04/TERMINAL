<style>
:root {
  --bg-0:#0d1117; --bg-1:#0d1117; --bg-2:rgba(255,255,255,.03);
  --bg-3:rgba(255,255,255,.06); --line:rgba(255,255,255,.06);
  --line-2:rgba(255,255,255,.12); --txt-0:#e6edf3;
  --txt-1:rgba(255,255,255,.7); --txt-2:rgba(255,255,255,.35);
  --txt-3:rgba(255,255,255,.25); --accent:#3fb950;
  --blue:#58a6ff; --blue-glow:rgba(88,166,255,.08);
  --radius-s:6px; --radius-m:10px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg-0);
  color:var(--txt-0);font-size:14px;-webkit-font-smoothing:antialiased}

.app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}

/* Sidebar */
.sidebar{background:var(--bg-1);border-right:1px solid var(--line);
  padding:28px 20px;position:sticky;top:0;height:100vh;overflow-y:auto;
  display:flex;flex-direction:column}
.brand{font-family:'Fraunces',serif;font-size:26px;font-weight:700;
  letter-spacing:-.02em;margin-bottom:4px;
  background:linear-gradient(135deg,var(--accent),var(--blue));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.brand-sub{font-size:11px;color:var(--txt-2);text-transform:uppercase;
  letter-spacing:.18em;margin-bottom:36px}
.nav{display:flex;flex-direction:column;gap:4px;flex:1}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 14px;
  border-radius:var(--radius-s);color:var(--txt-1);font-size:13px;font-weight:500;
  cursor:pointer;transition:all .15s ease;position:relative;text-decoration:none}
.nav-item:hover{background:var(--bg-2);color:var(--txt-0)}
.nav-item.active{background:var(--blue-glow);color:var(--blue)}
.nav-item.active::before{content:'';position:absolute;left:-20px;top:50%;
  transform:translateY(-50%);width:3px;height:18px;background:var(--blue);
  border-radius:0 2px 2px 0}
.nav-item .ti{font-size:18px;flex-shrink:0;opacity:.75}
.nav-section{font-size:10px;color:var(--txt-3);text-transform:uppercase;
  letter-spacing:.16em;padding:22px 14px 8px}
.status{padding:14px;background:var(--bg-2);border-radius:var(--radius-s);
  font-size:11px;color:var(--txt-2);margin-top:24px}
.status-dot{display:inline-block;width:6px;height:6px;border-radius:50%;
  background:var(--accent);margin-right:6px;box-shadow:0 0 8px var(--accent);
  animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Main — scrollable so the description panel is reachable below the map */
.main{padding:24px 28px 28px;display:flex;flex-direction:column;gap:10px;
  height:100vh;overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:var(--line-2) transparent}
.main::-webkit-scrollbar{width:4px}
.main::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:2px}
.topbar{display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tab-title{font-family:'Fraunces',serif;font-size:28px;font-weight:500;letter-spacing:-.02em}
.tab-sub{color:var(--txt-2);font-size:12px;margin-top:2px}

/* Map layout — 3 columns: indicator list | map | ranking */
.map-layout{display:grid;grid-template-columns:168px 1fr 252px;gap:12px;
  flex:1;min-height:380px}

/* Indicator panel (vertical list, replaces the long pills row) */
.indicator-panel{background:var(--bg-1);border:1px solid var(--line);
  border-radius:var(--radius-m);overflow-y:auto;padding:8px 0;display:flex;
  flex-direction:column;
  scrollbar-width:thin;scrollbar-color:var(--line-2) transparent}
.indicator-panel::-webkit-scrollbar{width:3px}
.indicator-panel::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:2px}
.ip-section{font-size:9px;color:var(--txt-3);text-transform:uppercase;
  letter-spacing:.14em;padding:10px 12px 4px;flex-shrink:0}
.ind-item{padding:8px 12px;font-size:11.5px;color:var(--txt-2);cursor:pointer;
  transition:all .12s;flex-shrink:0;line-height:1.3}
.ind-item:hover{background:var(--bg-2);color:var(--txt-0)}
.ind-item.active{background:rgba(63,185,80,.12);color:var(--accent);font-weight:500}

/* Map */
.map-container{background:#080c12;border:1px solid var(--line);
  border-radius:var(--radius-m);position:relative;overflow:hidden}
.map-container svg{display:block}
.map-loading{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;background:#080c12;z-index:10}
.spinner{width:30px;height:30px;border:2px solid rgba(255,255,255,.07);
  border-top-color:#3fb950;border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.map-loading-text{font-size:12px;color:var(--txt-2)}

/* Ranking */
.ranking-panel{background:var(--bg-1);border:1px solid var(--line);
  border-radius:var(--radius-m);padding:14px;overflow-y:auto;display:flex;
  flex-direction:column;gap:2px}
.ranking-title{font-size:10px;color:var(--txt-3);text-transform:uppercase;
  letter-spacing:.14em;margin-bottom:8px;flex-shrink:0}
.rank-item{display:flex;align-items:center;gap:8px;padding:7px 6px;
  border-radius:6px;cursor:pointer;transition:background .12s}
.rank-item:hover{background:rgba(255,255,255,.03)}
.rank-item.hl{background:rgba(88,166,255,.06)}
.rank-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--txt-3);
  width:14px;flex-shrink:0;text-align:right}
.rank-flag{font-size:16px;flex-shrink:0;line-height:1}
.rank-info{flex:1;min-width:0}
.rank-name{font-size:12px;color:var(--txt-0);white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis}
.rank-year{font-size:10px;color:var(--txt-3)}
.rank-val{font-size:11.5px;font-family:'DM Mono',monospace;color:#3fb950;
  text-align:right;flex-shrink:0;max-width:76px;word-break:break-all}

/* Legend */
.legend-bar{flex-shrink:0;padding:10px 14px;background:var(--bg-1);
  border:1px solid var(--line);border-radius:var(--radius-s)}
.legend-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.legend-label{font-size:11px;color:var(--txt-1);font-weight:500}
.legend-unit{font-size:10px;color:var(--txt-3)}
.legend-gradient{height:8px;border-radius:4px;margin-bottom:5px}
.legend-ticks{display:flex;justify-content:space-between;
  font-family:'DM Mono',monospace;font-size:9.5px;color:var(--txt-2)}
/* Tensions legend */
.tension-legend{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.tl-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--txt-2)}
.tl-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}

/* Descriptions */
.desc-panel{margin-top:4px;border:1px solid var(--line);border-radius:var(--radius-m);overflow:hidden}
.desc-summary{padding:10px 16px;cursor:pointer;display:flex;align-items:center;gap:8px;
  font-size:12px;color:var(--txt-2);list-style:none;background:var(--bg-2);
  user-select:none;-webkit-user-select:none}
.desc-summary::-webkit-details-marker{display:none}
.desc-summary .ti{font-size:15px}
.desc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line)}
.desc-card{background:var(--bg-1);padding:12px 14px}
.dc-title{font-size:11px;color:var(--txt-0);font-weight:600;margin-bottom:4px}
.dc-text{font-size:11px;color:var(--txt-2);line-height:1.5}
.dc-src{font-size:10px;color:var(--txt-3);margin-top:4px}

/* Tooltip */
.map-tooltip{position:fixed;background:#13181f;border:1px solid rgba(255,255,255,.12);
  border-radius:8px;padding:10px 13px;pointer-events:none;z-index:1000;max-width:220px;
  box-shadow:0 8px 28px rgba(0,0,0,.5);display:none}
.tt-country{font-size:13px;font-weight:600;color:var(--txt-0);margin-bottom:5px}
.tt-val{font-family:'DM Mono',monospace;font-size:15px;color:#3fb950}
.tt-year{font-size:10px;color:var(--txt-2);margin-top:3px;line-height:1.4}
</style>
</head>

// ═══════════════ COLOR RAMPS ═══════════════
// t ∈ [0.18, 0.92] — skip near-white start of D3 sequential scales
const INTERPS = {
  Blues:   d3.interpolateBlues,
  Greens:  d3.interpolateGreens,
  Purples: d3.interpolatePurples,
  Reds:    d3.interpolateReds,
  Oranges: d3.interpolateOranges,
};
const T_MIN = 0.20, T_MAX = 0.92;

function buildScale(vals, ramp) {
  const v = vals.filter(x => x != null && !isNaN(x));
  if(!v.length) return () => '#1a2030';
  const mn = d3.min(v), mx = d3.max(v);
  if(mn === mx) return () => '#3fb950';
  if(ramp === 'RdYlGn') return d3.scaleDiverging(d3.interpolateRdYlGn).domain([mn,(mn+mx)/2,mx]);
  const interp = INTERPS[ramp] || d3.interpolateBlues;
  const tsc = d3.scaleLinear().domain([mn,mx]).range([T_MIN, T_MAX]);
  return val => interp(tsc(val));
}

function gradientCSS(ramp, n=16) {
  if(ramp === 'TRed') {
    const colors = Object.values(TENSION_COLORS).slice(1);
    return `linear-gradient(to right, ${colors.join(',')})`;
  }
  const stops = Array.from({length:n+1},(_,i)=>{
    const t = ramp==='RdYlGn' ? i/n : T_MIN + (i/n)*(T_MAX-T_MIN);
    return ramp==='RdYlGn' ? d3.interpolateRdYlGn(i/n) : (INTERPS[ramp]||d3.interpolateBlues)(t);
  });
  return `linear-gradient(to right, ${stops.join(',')})`;
}

// ═══════════════ VALUE FORMAT ═══════════════
function fmtVal(v, code) {
  if(v===null||v===undefined||isNaN(v)) return 'Sin datos';
  const F = {
    'NY.GDP.MKTP.CD':     x=>'$'+(x/1e12).toFixed(2)+'T',
    'NY.GDP.PCAP.CD':     x=>'$'+Math.round(x).toLocaleString('es-ES'),
    'FI.RES.TOTL.CD':     x=>'$'+(x/1e9).toFixed(1)+'B',
    'NE.RSB.GNFS.CD':     x=>(x>=0?'+$':'-$')+(Math.abs(x)/1e9).toFixed(1)+'B',
    'SP.POP.TOTL':        x=>(x/1e6).toFixed(1)+'M',
    'SP.DYN.LE00.IN':     x=>x.toFixed(1)+' años',
    'EG.USE.ELEC.KH.PC':  x=>Math.round(x).toLocaleString('es-ES')+' kWh',
    'EN.ATM.CO2E.PC':     x=>x.toFixed(2)+' t',
    'OIL_PROD':           x=>Math.round(x).toLocaleString('es-ES')+' kb/día',
    'TENSIONS':           x=>TENSION_LABELS[x]||'',
  };
  if(F[code]) return F[code](v);
  return v.toFixed(2)+'%';
}

// ═══════════════ WB FETCH (mrv=10 → mejor cobertura CO₂ / Deuda) ═══════════════
async function fetchWB(code) {
  if(window.wbCache[code]) return window.wbCache[code];
  const url = `https://api.worldbank.org/v2/country/all/indicator/${code}?format=json&mrv=10&per_page=3000&gapfill=Y`;
  try {
    const r = await fetch(url);
    const json = await r.json();
    const rows = json[1]||[];
    const map = {};
    // rows vendrán ordenados por fecha desc; tomamos el primer no-nulo por país
    for(const row of rows) {
      if(!row.countryiso3code||row.value===null||row.value===undefined) continue;
      if(!map[row.countryiso3code]) map[row.countryiso3code]={value:+row.value,date:row.date};
    }
    window.wbCache[code] = map;
    return map;
  } catch(e) { console.error('WB error',e); return {}; }
}

// ═══════════════ MAP INIT ═══════════════
async function initMap() {
  // Use a small timeout so the browser fully resolves all CSS layout
  // (rAF alone is not enough when the page contains flex/grid with dynamic content)
  await new Promise(r => setTimeout(r, 60));

  const wrap = document.getElementById('map-container');
  // offsetWidth/offsetHeight are more reliable than getBoundingClientRect for layout
  const width  = wrap.offsetWidth  || 800;
  const height = wrap.offsetHeight || 470;

  // fitExtent lets D3 compute the correct scale AND translate automatically —
  // no manual formula, no risk of mis-centering.
  // {type:'Sphere'} represents the entire globe.
  const proj = d3.geoNaturalEarth1()
    .fitExtent([[8, 8], [width - 8, height - 8]], {type:'Sphere'});
  pathFn = d3.geoPath().projection(proj);

  svgEl = d3.select('#map-container').append('svg')
    .attr('width', width).attr('height', height).style('display','block');

  // scaleExtent [0.35, 10]: users can zoom out to 35 % (see full world + margins)
  // and zoom in up to 10 ×
  zoomBx = d3.zoom().scaleExtent([0.35, 10])
    .on('zoom', e => gEl.attr('transform', e.transform));
  svgEl.call(zoomBx);
  // Double-click resets zoom instead of zooming in
  svgEl.on('dblclick.zoom', null);
  svgEl.on('dblclick', () =>
    svgEl.transition().duration(400).call(zoomBx.transform, d3.zoomIdentity));
  gEl = svgEl.append('g').attr('class','countries-g');

  if(!window.worldTopo) {
    window.worldTopo = await d3.json(
      'https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
  }
  const countries = topojson.feature(window.worldTopo, window.worldTopo.objects.countries);

  gEl.selectAll('path.ctry').data(countries.features).enter()
    .append('path').attr('class','ctry')
    .attr('d', pathFn).attr('fill','#1a2030')
    .attr('stroke','rgba(255,255,255,.07)').attr('stroke-width',.4)
    .on('mouseover', onOver).on('mousemove', onMove).on('mouseout', onOut);

  // Zoom reset button (top-right corner of map)
  const resetBtn = document.createElement('button');
  resetBtn.title = 'Restablecer zoom (o doble clic en el mapa)';
  resetBtn.innerHTML = '<i class="ti ti-zoom-reset" style="font-size:15px"></i>';
  resetBtn.style.cssText = [
    'position:absolute;top:10px;right:10px;z-index:5',
    'background:rgba(13,17,23,.85);backdrop-filter:blur(6px)',
    'border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.6)',
    'border-radius:6px;padding:5px 8px;cursor:pointer;line-height:1',
    'transition:color .15s,border-color .15s'
  ].join(';');
  resetBtn.onmouseenter = () => { resetBtn.style.color='#fff'; resetBtn.style.borderColor='rgba(255,255,255,.28)'; };
  resetBtn.onmouseleave = () => { resetBtn.style.color='rgba(255,255,255,.6)'; resetBtn.style.borderColor='rgba(255,255,255,.12)'; };
  resetBtn.onclick = () => svgEl.transition().duration(400).call(zoomBx.transform, d3.zoomIdentity);
  wrap.appendChild(resetBtn);

  const deb = (fn,ms) => { let t; return(...a) => { clearTimeout(t); t=setTimeout(()=>fn(...a),ms); }; };
  window.addEventListener('resize', deb(() => {
    const W = wrap.offsetWidth  || 800;
    const H = wrap.offsetHeight || 470;
    svgEl.attr('width', W).attr('height', H);
    proj.fitExtent([[8, 8], [W - 8, H - 8]], {type:'Sphere'});
    pathFn = d3.geoPath().projection(proj);
    gEl.selectAll('path.ctry').attr('d', pathFn);
  }, 200));
}

// ═══════════════ REPAINT ═══════════════
function repaint() {
  const vals = Object.values(data).map(d=>d.value);

  if(active.special==='tensions') {
    gEl.selectAll('path.ctry').attr('fill',d=>{
      const iso3=NUM_ISO3[+d.id]; if(!iso3) return '#1a2030';
      const e=data[iso3]; if(!e) return TENSION_COLORS[0]; // green = no data = no conflict
      return TENSION_COLORS[e.value]??TENSION_COLORS[0];
    });
    updateTensionLegend();
    return;
  }

  cscale = buildScale(vals, active.ramp);
  gEl.selectAll('path.ctry').attr('fill',d=>{
    const iso3=NUM_ISO3[+d.id]; if(!iso3) return '#1a2030';
    const e=data[iso3]; if(!e) return '#1a2030';
    return cscale(e.value);
  });
  updateLegend(vals);
}

function updateLegend(vals) {
  const {label,unit,ramp,code}=active;
  document.getElementById('legend-label').textContent=label;
  document.getElementById('legend-unit').textContent=unit;
  const body=document.getElementById('legend-body');
  const v=vals.filter(x=>x!=null&&!isNaN(x));
  if(!v.length){body.innerHTML='';return;}
  const mn=d3.min(v),mx=d3.max(v);
  body.innerHTML=`<div class="legend-gradient" style="background:${gradientCSS(ramp)}"></div>
  <div class="legend-ticks">${[0,.25,.5,.75,1].map(t=>`<span>${fmtVal(mn+t*(mx-mn),code)}</span>`).join('')}</div>`;
}

  document.getElementById('legend-body').innerHTML =
    `<div class="tension-legend">${items.map(i=>
      `<div class="tl-item"><div class="tl-dot" style="background:${i.c}"></div>${i.l}</div>`
    ).join('')}</div>`;
}

// ═══════════════ RANKING ═══════════════
function updateRanking() {
  const {code,desc}=active;
  const entries=Object.entries(data)
    .filter(([,d])=>d.value!=null)
    .sort((a,b)=>desc?b[1].value-a[1].value:a[1].value-b[1].value)
    .slice(0,10);
  document.getElementById('ranking-list').innerHTML=entries.map(([iso3,d],i)=>`
    <div class="rank-item" id="ri-${iso3}"
         onmouseenter="hlC('${iso3}',true)" onmouseleave="hlC('${iso3}',false)">
      <span class="rank-num">${i+1}</span>
      <span class="rank-flag">${FLAGS[iso3]||'🏳'}</span>
      <div class="rank-info">
        <div class="rank-name">${cname(iso3)}</div>
        <div class="rank-year">${d.date||''}</div>
      </div>
      <div class="rank-val">${fmtVal(d.value,code)}</div>
    </div>`).join('');
}

function hlC(iso3,on) {
  const num=ISO3_NUM[iso3]; if(!num) return;
  gEl.selectAll('path.ctry').filter(d=>+d.id===num)
    .attr('stroke',on?'#58a6ff':'rgba(255,255,255,.07)')
    .attr('stroke-width',on?2:.4);
  const ri=document.getElementById('ri-'+iso3);
  if(ri) ri.classList.toggle('hl',on);
}

// ═══════════════ TOOLTIP ═══════════════
const ttEl=document.getElementById('map-tooltip');
function onOver(event,d) {
  const iso3=NUM_ISO3[+d.id]; const e=iso3?data[iso3]:null;
  document.getElementById('tt-country').textContent=(iso3?cname(iso3):'País')+' '+(FLAGS[iso3]||'');
  if(active.special==='tensions'&&e&&e.conflicts) {
    document.getElementById('tt-val').textContent=TENSION_LABELS[e.value]||'Sin conflicto';
    document.getElementById('tt-year').textContent=e.conflicts.join('\n');
    document.getElementById('tt-year').style.whiteSpace='pre-line';
  } else {
    document.getElementById('tt-val').textContent=e?fmtVal(e.value,active.code):'Sin datos';
    document.getElementById('tt-year').textContent=e?'Año: '+e.date:'';
    document.getElementById('tt-year').style.whiteSpace='normal';
  }
  ttEl.style.display='block';
  d3.select(event.currentTarget).attr('stroke','#e6edf3').attr('stroke-width',1.2);
}
function onMove(event) {
  const w=220,h=90,x=event.clientX+14,y=event.clientY-30;
  ttEl.style.left=(x+w>window.innerWidth?event.clientX-w-14:x)+'px';
  ttEl.style.top=(y+h>window.innerHeight?event.clientY-h-10:y)+'px';
}
function onOut() {
  ttEl.style.display='none';
  gEl.selectAll('path.ctry').attr('stroke','rgba(255,255,255,.07)').attr('stroke-width',.4);
}

// ═══════════════ DESCRIPTIONS ═══════════════
function renderDescriptions() {
  const grid = document.getElementById('desc-grid');
  grid.innerHTML = INDICATORS.map(ind => {
    const d = DESCS[ind.code];
    if(!d) return '';
    return `<div class="desc-card">
      <div class="dc-title">${d[0]}</div>
      <div class="dc-text">${d[1]}</div>
      <div class="dc-src">Fuente: ${d[2]}</div>
    </div>`;
  }).join('');
}

// ═══════════════ SELECT INDICATOR ═══════════════
async function selectIndicator(ind) {
  active=ind;
  renderIndicatorList();
  const loading=document.getElementById('map-loading');
  loading.style.display='flex';
  if(ind.special==='tensions') {
    data=getTensionsData();
  } else if(ind.special==='oil') {
    data=getOilData();
  } else {
    data=await fetchWB(ind.code);
  }
  loading.style.display='none';
  repaint();
  updateRanking();
}

// ═══════════════ BOOT ═══════════════
(async function boot() {
  renderIndicatorList();
  renderDescriptions();
  await initMap();
  await selectIndicator(INDICATORS[0]);
}());
</script>
</body>
</html>
